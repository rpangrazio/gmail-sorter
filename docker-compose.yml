# =============================================================================
# Gmail AI Sorter — Docker Compose
# =============================================================================
#
# Usage:
#
#   # First-time OAuth2 authorization (opens browser or prints URL):
#   docker-compose run --rm sorter python -m src.main --setup
#
#   # Start the agent in the background:
#   docker-compose up -d
#
#   # Follow live logs:
#   docker-compose logs -f
#
#   # Stop the agent:
#   docker-compose down
#
# Prerequisites:
#   1. Create a .env file from .env.example and fill in ANTHROPIC_API_KEY.
#   2. Place your Google OAuth2 credentials.json in ./credentials/
#   3. Edit config/config.yaml with your GCP project details and categories.
# =============================================================================

services:
  sorter:
    build:
      context: .
      dockerfile: Dockerfile
    image: gmail-sorter:latest
    container_name: gmail-sorter

    # Restart automatically on crash or Docker daemon restart.
    # Does NOT restart if stopped manually with `docker-compose down`.
    restart: unless-stopped

    # Load environment variables from .env file.
    env_file:
      - .env

    volumes:
      # Persistent data: OAuth2 token and Gmail history state.
      # This named volume survives `docker-compose down` (use `down -v` to remove).
      - gmail-sorter-data:/data

      # OAuth2 client secrets — read-only for security.
      # Place your credentials.json in ./credentials/ before first run.
      - ./credentials:/credentials:ro

      # Configuration — read-only so live edits on the host are visible
      # after a container restart without rebuilding the image.
      - ./config:/app/config:ro

    # No ports needed — the agent uses outbound-only Pub/Sub pull connections.

    # Logging configuration: JSON format for easy parsing by log aggregators.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Resource limits (adjust based on your host capacity).
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M

    # Uncomment the depends_on block below when using state_backend=postgres.
    # depends_on:
    #   postgres:
    #     condition: service_healthy

  # ---------------------------------------------------------------------------
  # Optional PostgreSQL service — used when state_backend = "postgres"
  # ---------------------------------------------------------------------------
  # To enable:
  #   1. Uncomment this entire block and the depends_on block above.
  #   2. Set state_backend: "postgres" in config/config.yaml.
  #   3. Set DATABASE_URL=postgresql://sorter:sorter@postgres:5432/gmail_sorter
  #      in your .env file.
  #   4. Run: docker-compose up -d
  # ---------------------------------------------------------------------------
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: gmail-sorter-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: sorter
  #     POSTGRES_PASSWORD: sorter
  #     POSTGRES_DB: gmail_sorter
  #   volumes:
  #     - gmail-sorter-pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U sorter -d gmail_sorter"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 256M
  #         cpus: "0.25"

# Named volume for persistent state (token.json, state.json / SQLite db).
# This volume is NOT removed by `docker-compose down` — use `docker-compose down -v`
# or `docker volume rm gmail-sorter_gmail-sorter-data` to delete it.
volumes:
  gmail-sorter-data:
    name: gmail-sorter-data
  # Uncomment when using the postgres service above.
  # gmail-sorter-pgdata:
  #   name: gmail-sorter-pgdata
